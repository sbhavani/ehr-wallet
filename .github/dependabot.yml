# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Enable npm dependency updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    reviewers:
      - maintainers
    # Ignore major version upgrades for helia (v6 is not compatible with Next.js webpack)
    ignore:
      - dependency-name: "helia"
        update-types: ["major"]
